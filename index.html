<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>SnapCal — Calorie Tracker</title>
  <meta name="description" content="Free, private, offline-first calorie tracker with on-device photo food detection and barcode scanning." />
  <meta name="theme-color" content="#16a34a" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <!-- iOS PWA / add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SnapCal" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
</head>
<body>
  <div id="app"></div>

  <script src="i18n.js"></script>
  <script src="foods.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      function notifyUpdate(reg) {
        window.__swReg = reg;
        window.dispatchEvent(new Event("snapcal-update"));
      }
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          // A new worker may already be waiting (installed on a previous visit).
          if (reg.waiting && navigator.serviceWorker.controller) notifyUpdate(reg);
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", function () {
              // Installed + an existing controller => this is an update, not first install.
              if (nw.state === "installed" && navigator.serviceWorker.controller) notifyUpdate(reg);
            });
          });
        }).catch(function (e) { console.warn("SW registration failed", e); });

        // When the new worker takes control, reload once to load fresh assets.
        var reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
