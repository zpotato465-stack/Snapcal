<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>SnapCal — Calorie Tracker</title>
  <meta name="description" content="Free, private, offline-first calorie tracker with on-device photo food detection and barcode scanning." />
  <meta name="theme-color" content="#16a34a" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <!-- iOS PWA / add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SnapCal" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
</head>
<body>
  <div id="app"></div>

  <script src="i18n.js"></script>
  <script src="foods.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) {
          console.warn("SW registration failed", e);
        });
      });
    }
  </script>
</body>
</html>
